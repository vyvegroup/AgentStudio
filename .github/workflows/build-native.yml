name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release'
        required: false
        default: 'true'

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          # Create keystore
          keytool -genkeypair -v -keystore release.keystore \
            -alias agentstudio \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass agentstudio123 \
            -keypass agentstudio123 \
            -dname "CN=AgentStudio, OU=Dev, O=AgentStudio, L=City, ST=State, C=US"

          # Get build-tools version
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)

          # Sign APK
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:agentstudio123 \
            --key-pass pass:agentstudio123 \
            --ks-key-alias agentstudio \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-signed.apk

  release:
    name: Create Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.event.inputs.release == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./release

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | head -1 | sed 's/.*versionName = "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## AgentStudio v${{ steps.version.outputs.version }}

            ### Features
            - 🤖 Cloud AI with OpenRouter API
            - 📁 File management tools
            - 🌐 Web search capability
            - 🖼️ Image search (Gelbooru)
            - 🔧 Local AI support (requires manual GGUF model placement)

            ### How to use Local AI
            1. Download a GGUF model (recommended: Qwen 2.5 1.5B Instruct)
            2. Place it in: /storage/emulated/0/Android/data/com.agentstudio/files/models/
            3. Go to Settings → Local AI section
            4. Select and load the model

            ### Cloud Models Available
            - Step 3.5 Flash (free)
            - Qwen 3.6 Plus (free)
            - GLM 4.5 Air (free)

          files: |
            release/app-release-signed.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
