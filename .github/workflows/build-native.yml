name: Build Native Libraries

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-native.yml'

jobs:
  build-native:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Clone llama.cpp
        run: |
          cd AgentStudio/app/src/main/cpp
          if [ ! -d "llama.cpp" ]; then
            git clone --depth 1 https://github.com/ggerganov/llama.cpp.git
          fi

      - name: Build native library for arm64-v8a
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          cd AgentStudio/app/src/main/cpp

          mkdir -p build/arm64-v8a
          cd build/arm64-v8a

          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            ../..

          cmake --build . --config Release -j$(nproc)
          
          echo "=== Built files ==="
          ls -la *.so 2>/dev/null || ls -la

      - name: Build native library for armeabi-v7a
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          cd AgentStudio/app/src/main/cpp

          mkdir -p build/armeabi-v7a
          cd build/armeabi-v7a

          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            ../..

          cmake --build . --config Release -j$(nproc)

      - name: Check library dependencies
        run: |
          echo "=== Checking arm64-v8a library dependencies ==="
          readelf -d AgentStudio/app/src/main/cpp/build/arm64-v8a/libllama-android.so 2>/dev/null | grep NEEDED || echo "Checking alternative location..."
          find AgentStudio/app/src/main/cpp/build -name "*.so" -exec readelf -d {} \; 2>/dev/null | grep NEEDED || true

      - name: Copy native libraries
        run: |
          mkdir -p AgentStudio/app/src/main/jniLibs/arm64-v8a
          mkdir -p AgentStudio/app/src/main/jniLibs/armeabi-v7a

          cp AgentStudio/app/src/main/cpp/build/arm64-v8a/libllama-android.so AgentStudio/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
          cp AgentStudio/app/src/main/cpp/build/armeabi-v7a/libllama-android.so AgentStudio/app/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true
          
          echo "=== Final libraries ==="
          ls -la AgentStudio/app/src/main/jniLibs/*/

      - name: Upload native libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-libraries
          path: AgentStudio/app/src/main/jniLibs/
          retention-days: 30

  build-apk:
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libraries
          path: AgentStudio/app/src/main/jniLibs/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: |
          cd AgentStudio
          echo "api.key=${{ secrets.OPENROUTER_API_KEY }}" > local.properties
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: venai-release-apk
          path: AgentStudio/app/build/outputs/apk/release/*.apk
