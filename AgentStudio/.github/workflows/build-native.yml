name: Build Native Libraries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-native.yml'

jobs:
  build-native:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Clone llama.cpp
        run: |
          cd app/src/main/cpp
          if [ ! -d "llama.cpp" ]; then
            git clone --depth 1 https://github.com/ggerganov/llama.cpp.git
          fi

      - name: Build native library for arm64-v8a
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          cd app/src/main/cpp

          mkdir -p build/arm64-v8a
          cd build/arm64-v8a

          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_NATIVE=OFF \
            -DLLAMA_CUBLAS=OFF \
            -DLLAMA_OPENBLAS=OFF \
            -DLLAMA_METAL=OFF \
            -DBUILD_SHARED_LIBS=ON \
            ../..

          cmake --build . --config Release -j$(nproc)

      - name: Build native library for armeabi-v7a
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          cd app/src/main/cpp

          mkdir -p build/armeabi-v7a
          cd build/armeabi-v7a

          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_NATIVE=OFF \
            -DLLAMA_CUBLAS=OFF \
            -DLLAMA_OPENBLAS=OFF \
            -DLLAMA_METAL=OFF \
            -DBUILD_SHARED_LIBS=ON \
            ../..

          cmake --build . --config Release -j$(nproc)

      - name: Copy native libraries
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a

          cp app/src/main/cpp/build/arm64-v8a/libllama-android.so app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
          cp app/src/main/cpp/build/armeabi-v7a/libllama-android.so app/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true

      - name: Upload native libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-libraries
          path: app/src/main/jniLibs/
          retention-days: 30

  build-apk:
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libraries
          path: app/src/main/jniLibs/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: |
          echo "api.key=${{ secrets.OPENROUTER_API_KEY }}" > local.properties
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: venai-release-apk
          path: app/build/outputs/apk/release/*.apk
